<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Future Officer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.register-card {
    width: 420px;
    padding: 45px;
    border-radius: 20px;
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    color: white;
}

.brand-text {
    letter-spacing: 3px;
    color: #00c6ff;
    font-weight: 500;
    font-size: 14px;
}

.tagline {
    font-size: 13px;
    opacity: 0.8;
}

.form-control {
    background: rgba(255, 255, 255, 0.12);
    border: none;
    color: white;
    border-radius: 10px;
    padding: 10px;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.7);
}

.form-control:focus {
    box-shadow: 0 0 12px rgba(0, 198, 255, 0.8);
    background: rgba(255, 255, 255, 0.18);
    color: white;
}

.btn-register {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 30px;
    padding: 10px;
    font-weight: 500;
    transition: 0.3s ease;
}

.btn-register:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
}

.extra-links {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

.extra-links a {
    color: #00c6ff;
    text-decoration: none;
}

.extra-links a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="register-card">

    <div class="text-center mb-4">
        <div class="brand-text">FUTURE OFFICER</div>
        <h2 style="font-weight:600;">Create Account</h2>
        <p class="tagline">Begin your journey towards success</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="mb-3">
            <input type="text" name="mobile" class="form-control" placeholder="Mobile Number" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-register">Register</button>
        </div>
    </form>

    <div class="extra-links">
        <p class="mt-3">
            Already have an account? 
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>

</div>

</body>
</html>

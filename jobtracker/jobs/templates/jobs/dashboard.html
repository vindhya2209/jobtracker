<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">📊 Dashboard</h2>

    <div class="row text-center">

        <div class="col-md-3">
            <div class="card shadow p-3">
                <h4>{{ total_jobs }}</h4>
                <p>Total Jobs</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3">
                <h4>{{ applied_jobs }}</h4>
                <p>Applied</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3">
                <h4>{{ pending_jobs }}</h4>
                <p>Pending</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3">
                <h4>{{ expired_jobs }}</h4>
                <p>Expired</p>
            </div>
        </div>

    </div>
</div>

</body>
</html>

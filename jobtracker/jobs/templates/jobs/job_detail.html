<!DOCTYPE html>
<html>
<head>
    <title>{{ job.title }}</title>
</head>
<body>

    <h2>{{ job.title }}</h2>
    <p><strong>Organization:</strong> {{ job.organization }}</p>
    <p><strong>Deadline:</strong> {{ job.last_date }}</p>
    <p><strong>Status:</strong> {{ job.status }}</p>
<p>
    <a href="{{ job.url }}" target="_blank">View Official Notification</a>
</p>
<p><strong>Application Link:</strong></p>

{% if job.url %}
    <a href="{{ job.url }}" target="_blank">
        Apply Now
    </a>
{% endif %}
<p>DEBUG: {{ job.url }}</p>


    <a href="/">Back</a>

</body>
</html>
